@startuml bgp-worker-component
skinparam defaultFontSize 12
skinparam defaultFontName Arial
skinparam titleFontSize 14
skinparam titleFontStyle bold
skinparam padding 8
skinparam shadowing false
skinparam roundCorner 8
skinparam componentBackgroundColor #dae8fc
skinparam componentBorderColor #336699
skinparam rectangleBackgroundColor #f5f5f5
skinparam rectangleBorderColor #999999

title Worker node — component view

rectangle "**K8s worker node**" as node #f0f4ff {
  component "**Cilium**\nCNI DaemonSet\nveth lifecycle, eBPF policy\npod /128 routes" as cilium #dae8fc
  component "**GoBGP**\nBGP DaemonSet (hostNetwork)\nVPNv4/VPNv6 PE\none VRF per tenant · RFC 9252" as gobgp #dae8fc
  component "**galactic-operator**\nController DaemonSet (privileged)\nVRF lifecycle, lxc enslavement\nGoBGP config via gRPC" as operator #dae8fc
}

rectangle "**Linux kernel**" as kernel #fff8e6 {
  component "**VRF devices**\nvrf-tenant-{name}\nOne per tenant\nseparate routing table" as vrf #ffe6cc
  component "**seg6local**\nSRv6 End.DT4 / End.DT6 / End.DT46\nDecap + VRF lookup\nfor inbound tenant traffic" as seg6 #ffe6cc
}

cilium - -> kernel : Creates lxcXXXX veth pairs [Netlink]
operator - -> vrf : Creates/destroys [Netlink]
operator - -> cilium : Watches lxc NEWLINK events [Netlink]
operator - -> gobgp : Configures VRFs and paths [gRPC]
gobgp - -> seg6 : Programs End.DT4/DT6/DT46 SIDs [Netlink]

@enduml

