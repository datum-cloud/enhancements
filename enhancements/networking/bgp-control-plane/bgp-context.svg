@startuml bgp-context
skinparam rectangleBackgroundColor #dae8fc
skinparam rectangleBorderColor #336699
skinparam arrowColor #333333
skinparam defaultFontSize 12
skinparam defaultFontName Arial
skinparam titleFontSize 14
skinparam titleFontStyle bold
skinparam padding 8
skinparam shadowing false
skinparam roundCorner 8

title BGP control plane — system context

rectangle "**Tier 0 — Global RRs**" as tier0 #f3e6ff {
  rectangle "**us-east-2**\nGlobal RR (FRR)\nNew York City" as rr_nyc #e1d5e7
  rectangle "**de-central-1**\nGlobal RR (FRR)\nFrankfurt" as rr_fra #e1d5e7
}

rectangle "**Tier 1 — Americas**" as tier1_am #e6fff9 {
  rectangle "**Americas RR pair**\nFRR — Anchored at NYC\nactive/active" as rr_am #ccffe6
  rectangle "**7 × worker nodes**\nGoBGP\nus-east-1/2, us-central-1, us-west-1\nca-east-1, br-east-1, cl-central-1" as pop_am #dae8fc
}

rectangle "**Tier 1 — EMEA**" as tier1_eu #e6fff9 {
  rectangle "**EMEA RR pair**\nFRR — Anchored at Frankfurt\nactive/active" as rr_eu #ccffe6
  rectangle "**5 × worker nodes**\nGoBGP\nde-central-1, gb-south-1, nl-west-1\nae-north-1, za-central-1" as pop_eu #dae8fc
}

rectangle "**Tier 1 — Asia-Pacific**" as tier1_ap #e6fff9 {
  rectangle "**APAC RR pair**\nFRR — Anchored at Singapore\nactive/active" as rr_ap #ccffe6
  rectangle "**4 × worker nodes**\nGoBGP\nsg-central-1, jp-east-1\nau-east-1, in-west-1" as pop_ap #dae8fc
}

rr_nyc <- -> rr_fra : iBGP full mesh

rr_am - -> rr_nyc : iBGP
rr_am - -> rr_fra : iBGP
rr_eu - -> rr_nyc : iBGP
rr_eu - -> rr_fra : iBGP
rr_ap - -> rr_nyc : iBGP
rr_ap - -> rr_fra : iBGP

pop_am - -> rr_am : iBGP (2 sessions/node)
pop_eu - -> rr_eu : iBGP (2 sessions/node)
pop_ap - -> rr_ap : iBGP (2 sessions/node)

@enduml

